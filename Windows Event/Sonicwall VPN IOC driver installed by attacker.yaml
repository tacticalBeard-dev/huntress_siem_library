title: Sonicwall VPN IOC driver installed by attacker
id: null
status: Production
description: >
  Find all logs where the event provider is equal to Microsoft-Windows-Security-Auditing and driver service reported by Huntress blog.
author: tacticalbeard-dev
date: 2025/08/18
modified: 2025/08/18
references:
  - "https://support.huntress.io/hc/en-us/articles/30113222043155-Huntress-Managed-SIEM-Log-Search-Guide"
  - "https://support.huntress.io/hc/en-us/articles/36005287194259-Collecting-Microsoft-Windows-Event-Logs"
  - "https://www.huntress.com/blog/exploitation-of-sonicwall-vpn"
  - "https://www.bleepingcomputer.com/news/security/akira-ransomware-abuses-cpu-tuning-tool-to-disable-microsoft-defender/"
tags:
  - cybersecurity
  - windows.event
  - ioc
logsource:
  language: ESQL
  platform: Huntress SIEM
  type: Windows Event
analyst_notes: >
  Driver services created by attacker posted on Huntress blog as IOCs.
  The abused driver is 'rwdrv.sys' (used by ThrottleStop), which the threat actors register as a service to gain kernel-level access.
  This driver is likely used to load a second driver, 'hlpdrv.sys,' a malicious tool that manipulates Windows Defender to turn off its protections.
query: >
  from logs 
  | WHERE 
      event.provider=="Microsoft-Windows-Security-Auditing" 
  | WHERE 
      event.code=="4697" 
  | WHERE 
      winlog.event_data.ServiceName=="rwdrv.sys"
      or
      winlog.event_data.ServiceName=="hlpdrv.sys"
  | LIMIT
      10
