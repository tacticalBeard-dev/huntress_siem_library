title: Registry Key Modification
id: null
status: Production
description: >
  Find all logs where a specific registry key has been modified. This query targets keys under the 'Run' registry path, which are often used for persistence.
author: tacticalbeard-dev
date: 2025/09/22
modified: 2025/09/22
references:
  - "https://support.huntress.io/hc/en-us/articles/35217204475411-Starter-Queries-Windows-Security"
  - "https://support.huntress.io/hc/en-us/articles/36005287194259-Collecting-Microsoft-Windows-Event-Logs"
tags:
  - cybersecurity
  - windows.event
  - ioc
  - persistence
logsource:
  language: ESQL
  platform: Huntress SIEM
  type: Windows Event
analyst_notes: >
  This query looks for modifications to the HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run registry key, which is a common persistence technique. It uses a partial string match for the registry key path.
query: >
  from logs
  | where event.provider == "Microsoft-Windows-Security-Auditing"
  | where event.code == 4657
  | where winlog.event_data.ObjectName LIKE "%REGISTRY\MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Run%"
  | keep
    winlog.event_data.SubjectUserName,
    winlog.event_data.ObjectName,
    winlog.event_data.ProcessName,
    winlog.event_data.NewValue
  | LIMIT 
      10