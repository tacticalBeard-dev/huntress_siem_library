title: Username is Administrator
id: null
status: Production
description: >
  Find all logs where the event provider is equal to Microsoft-Windows-Security-Auditing and the username is equal to administrator.
author: tacticalbeard-dev
date: 2025/07/14
modified: 2025/07/14
references:
  - "https://support.huntress.io/hc/en-us/articles/35217204475411-Starter-Queries-Windows-Security"
  - "https://support.huntress.io/hc/en-us/articles/36005287194259-Collecting-Microsoft-Windows-Event-Logs"
tags:
  - cybersecurity
  - windows.event
  - ioc
logsource:
  language: ESQL
  platform: Huntress SIEM
  type: Windows Event
analyst_notes: >
  Event ID 4625 - Account logon failed
query: >
  from logs
  | WHERE 
      event.provider=="Microsoft-Windows-Security-Auditing" 
  | WHERE 
      user.name == "administrator"
  | KEEP
      event.code,
      message,
      host.hostname,
      source.host.name,
      user.name,
      winlog.channel
  | LIMIT 
      10