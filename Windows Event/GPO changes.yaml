title: GPO Changes
id: null
status: Production
description: >
  Find all logs where the event provider is equal to Microsoft-Windows-Security-Auditing and the event code is equal to 5136.
author: tacticalbeard-dev
date: 2025/08/18
modified: 2025/08/18
references:
  - "https://support.huntress.io/hc/en-us/articles/35217204475411-Starter-Queries-Windows-Security"
  - "https://support.huntress.io/hc/en-us/articles/36005287194259-Collecting-Microsoft-Windows-Event-Logs"
tags:
  - cybersecurity
  - windows.event
  - ioc
logsource:
  language: ESQL
  platform: Huntress SIEM
  type: Windows Event
analyst_notes: >
  Event ID 5136 - A directory service object was modified.
query: >
  from logs
  | WHERE 
      event.provider=="Microsoft-Windows-Security-Auditing" 
  | WHERE 
      event.code=="5136" 
  | KEEP 
      host.hostname, 
      user.name, 
      event.code, 
      message, 
      winlog.event_data.ObjectDN, 
      winlog.event_data.OperationType 
  | LIMIT
      10




