title: Sonicwall VPN IOC user created by attacker
id: null
status: Production
description: >
  Find all logs where the event provider is equal to Microsoft-Windows-Security-Auditing and user name IOC reported by Huntress blog.
author: tacticalbeard-dev
date: 2025/08/18
modified: 2026/05/02
references:
  - "https://support.huntress.io/hc/en-us/articles/30113222043155-Huntress-Managed-SIEM-Log-Search-Guide"
  - "https://support.huntress.io/hc/en-us/articles/36005287194259-Collecting-Microsoft-Windows-Event-Logs"
  - "https://www.huntress.com/blog/exploitation-of-sonicwall-vpn"
tags:
  - attack.t1136.001
  - attack.persistence
  - windows.event
logsource:
  language: ESQL
  platform: Huntress SIEM
  type: Windows Event
analyst_notes: >
  User accounts created by attacker posted on Huntress blog as IOCs.
query: >
  from logs
  | WHERE 
      event.provider=="Microsoft-Windows-Security-Auditing" 
  | WHERE 
      winlog.event_data.TargetUserName =="backupSQL"
      or
      winlog.event_data.TargetUserName =="lockadmin"
  | LIMIT
      10
